<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Registration Form</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

.container{
    width: 400px;
    background: white;
    padding: 20px;
    margin: 50px auto;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

h2{
    text-align: center;
    color: darkblue;
}

label{
    display: block;
    margin-top: 10px;
    font-weight: bold;
}

input,
select,
textarea{
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button{
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: darkblue;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover{
    background: blue;
}

</style>
</head>

<body>

<div class="container">

    <h2>Book Registration Form</h2>

    <form id="bookForm">

        <label>Book Title</label>
        <input type="text" id="title" placeholder="Enter book title" required>

        <label>Author Name</label>
        <input type="text" id="author" placeholder="Enter author name" required>

        <label>Book Category</label>
        <select id="category">
            <option>Education</option>
            <option>Science</option>
            <option>Technology</option>
            <option>Novel</option>
            <option>History</option>
        </select>

        <label>Publication Year</label>
        <input type="number" id="year" placeholder="Enter publication year" required>

        <label>Description</label>
        <textarea id="description" placeholder="Write short description"></textarea>

        <button type="submit">Register Book</button>

    </form>

</div>

<script>

document.getElementById("bookForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    let title = document.getElementById("title").value;

    alert("Book '" + title + "' registered successfully!");

});

</script>

</body>
</html>
